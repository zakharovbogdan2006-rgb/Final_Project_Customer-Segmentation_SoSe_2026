<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ollama Chat</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #ececec;
      display: flex;
      height: 100vh;
    }

    /* Левая колонка — история */
    #sidebar {
      width: 260px;
      background: #f7f7f7;
      border-right: 1px solid #ccc;
      padding: 15px;
      overflow-y: auto;
    }

    /* Правая часть — чат */
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat-history {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #d0eaff;
      align-self: flex-end;
    }

    .assistant {
      background: #e8e8e8;
      align-self: flex-start;
    }

    /* Поле ввода снизу */
    #input-area {
      display: flex;
      padding: 15px;
      background: #fff;
      border-top: 1px solid #ccc;
    }

    #questionInput {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #aaa;
      font-size: 16px;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: #4a8cff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #result {
      white-space: pre-wrap;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin: 20px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

  <!-- Левая колонка -->
  <div id="sidebar">
    <h3>История</h3>
    <div id="history-list"></div>
  </div>

  <!-- Правая часть -->
  <div id="chat-container">

    <div id="chat-history"></div>

    <div id="result">Ответ появится здесь...</div>

    <h3 style="padding-left:20px;">Анализ изображения</h3>
    <div style="padding: 0 20px;">
      <input type="file" id="imageInput" accept="image/*">
      <button onclick="sendImage()">Отправить изображение</button>
    </div>

    <!-- Поле ввода -->
    <div id="input-area">
      <input id="questionInput" type="text" placeholder="Введите сообщение...">
      <button id="sendBtn">Отправить</button>
    </div>

     <script src="script.js"></script>

  </div>
</body>
</html>
